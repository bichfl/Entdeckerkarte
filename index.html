<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenStreetMap mit Marker-Clustering</title>
    
    <!-- Verhindert den Favicon-Fehler in der Konsole -->
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <!-- Lokale Leaflet-Dateien aus deinem Projektordner -->
    <link rel="stylesheet" href="leaflet.css" />
    <script src="leaflet.js"></script>

    <!-- KORREKTUR: Vollständige CDN-Links für das Marker-Clustering Plugin -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
	<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
	<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <style>
        /* Feste Höhe für die Karte */
        #map { height: 600px; width: 100%; }
    </style>
</head>


<body>

    <div id="map"></div>

    <script>
        function initMap() {
            // Erweiterte Sicherheitsabfrage für Leaflet UND das Cluster-Plugin
            if (typeof L === 'undefined' || typeof L.markerClusterGroup === 'undefined') {
                console.log("Warte auf Leaflet und Cluster-Bibliothek...");
                setTimeout(initMap, 200);
                return;
            }

            console.log("Leaflet erfolgreich erkannt! Starte Karte...");
            const map = L.map('map').setView([52.5200, 13.4050], 14);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'
            }).addTo(map);

            const markersClusterGroup = L.markerClusterGroup();
            map.addLayer(markersClusterGroup);

                        function loadMarkers() {
                const zoom = map.getZoom();
                let bbox = "";

                // Wenn zu weit herausgezoomt (Zoom unter 13), begrenzen wir den Suchbereich künstlich
                if (zoom < 13) {
                    console.log("Zoom niedrig. Begrenze Overpass-Suchbereich auf Kartenzentrum.");
                    
                    const center = map.getCenter();
                    // Errechnet ein kleines, stabiles Suchfenster um das Zentrum (ca. 10-15km)
                    const latOffset = 0.08; 
                    const lonOffset = 0.15; 

                    const south = center.lat - latOffset;
                    const west = center.lng - lonOffset;
                    const north = center.lat + latOffset;
                    const east = center.lng + lonOffset;

                    bbox = south + "," + west + "," + north + "," + east;
                } else {
                    // Im normalen Zoom-Level nutzen wir das gesamte sichtbare Fenster
                    const bounds = map.getBounds();
                    bbox = bounds.getSouth() + "," + bounds.getWest() + "," + bounds.getNorth() + "," + bounds.getEast();
                }
                
                const basis = "https://overpass-api.de";
                const pfad = "/api/interpreter?data=";
                const befehl = "[out:json];node[amenity=cafe](" + bbox + ");out;";
                
                const frischeUrl = basis + pfad + befehl;
				
				const meinCustomIcon = L.icon({
				  iconUrl: 'icon.png',
				  iconSize: L.point(32, 32),
				  iconAnchor: L.point(16, 32),
				  popupAnchor: L.point(0, -32)
				});

                fetch(frischeUrl)
                    .then(response => response.json())
                    .then(data => {
                        // Alte Marker entfernen, um Speicher zu sparen und die Performance zu sichern
                        markersClusterGroup.clearLayers();

                        data.elements.forEach(element => {
                            if (element.lat && element.lon) {
                                const name = element.tags.name || "Unbenanntes Café";
                                const marker = L.marker([element.lat, element.lon], { icon: meinCustomIcon })
                                                .bindPopup("<b>" + name + "</b>");
                                markersClusterGroup.addLayer(marker);
                            }
                        });
                    })
                    .catch(error => console.error("Fehler beim Laden der OSM-Daten:", error));
            }


            map.on('moveend', loadMarkers);
            loadMarkers();
        }

        window.onload = initMap;
    </script>
</body>
</html>
